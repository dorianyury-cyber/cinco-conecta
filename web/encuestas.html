<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinco Conecta — Encuestas</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="reconocimientos.html" class="brand">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Cinco Conecta</span>
      </a>
      <nav>
        <a href="reconocimientos.html">🙌 Reconocimientos</a>
        <a href="encuestas.html">📊 Encuestas</a>
        <a href="comunicados.html">📢 Comunicados</a>
        <a href="incidentes.html">⚠️ Incidentes</a>
        <a href="acciones-correctivas.html">✅ Acciones Correctivas</a>
        <a href="documentos.html">📁 Documentos</a>
        <a href="auditorias.html">🔍 Auditorías</a>
        <a href="informes-plantillas.html">📑 Plantillas Informes</a>
        <a href="informes-libres.html">📝 Informes Libres</a>
        <a href="candidatos.html" class="solo-admin">👥 Candidatos</a>
        <a href="vacantes-admin.html" class="solo-admin">📋 Vacantes</a>
        <a href="empleados.html" class="solo-admin">🧑‍💼 Empleados</a>
      </nav>
      <div class="spacer"></div>
      <div class="user-box">
        <div id="userName">-</div>
        <a href="cambiar-password.html" class="btn secondary btn-auto mt-4">🔑 Cambiar contraseña</a>
        <button class="btn secondary logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>📊 Encuestas</h1>
      </header>

      <div class="card solo-admin hidden" id="crearEncuestaCard">
        <h2>Nueva encuesta</h2>
        <form id="crearEncuestaForm">
          <label for="tituloEncuesta">Título</label>
          <input type="text" id="tituloEncuesta" required maxlength="150">

          <label for="preguntasEncuesta">Preguntas (una por línea, máximo 3 — se responden en escala de 1 a 5)</label>
          <textarea id="preguntasEncuesta" rows="3" required placeholder="¿Qué tan satisfecho estás con...?"></textarea>

          <div class="alert" id="crearAlertBox"></div>
          <button type="submit" class="btn" id="crearEncuestaBtn">Publicar encuesta</button>
        </form>
      </div>

      <div id="encuestaActivaContenedor"></div>

      <div class="card">
        <h2>Encuestas anteriores</h2>
        <div id="historialEncuestas"><p class="text-muted">Cargando...</p></div>
      </div>
    </main>
  </div>

  <script type="module" src="js/encuestas.js"></script>
</body>
</html>
