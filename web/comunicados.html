<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinco Conecta — Comunicados</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="reconocimientos.html" class="brand">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Cinco Conecta</span>
      </a>
      <nav>
        <div class="nav-group" data-grupo="experiencia">
          <button type="button" class="nav-group-toggle">
            <span>🙌 Experiencia</span>
            <span class="nav-group-chevron">▾</span>
          </button>
          <div class="nav-group-items">
            <a href="reconocimientos.html">🙌 Reconocimientos</a>
            <a href="encuestas.html">📊 Encuestas</a>
            <a href="comunicados.html">📢 Comunicados</a>
          </div>
        </div>

        <div class="nav-group" data-grupo="sgi">
          <button type="button" class="nav-group-toggle">
            <span>✅ SGI-HSEQ</span>
            <span class="nav-group-chevron">▾</span>
          </button>
          <div class="nav-group-items">
            <a href="incidentes.html">⚠️ Incidentes</a>
            <a href="acciones-correctivas.html">✅ Acciones Correctivas</a>
            <a href="documentos.html">📁 Documentos</a>
            <a href="auditorias.html">🔍 Auditorías</a>
          </div>
        </div>

        <div class="nav-group" data-grupo="interventoria">
          <button type="button" class="nav-group-toggle">
            <span>📝 Interventoría</span>
            <span class="nav-group-chevron">▾</span>
          </button>
          <div class="nav-group-items">
            <a href="informes-plantillas.html">📑 Plantillas Informes</a>
            <a href="informes-libres.html">📝 Informes Libres</a>
          </div>
        </div>

        <div class="nav-group solo-admin" data-grupo="talento">
          <button type="button" class="nav-group-toggle">
            <span>👥 Talento Humano</span>
            <span class="nav-group-chevron">▾</span>
          </button>
          <div class="nav-group-items">
            <a href="candidatos.html">👥 Candidatos</a>
            <a href="vacantes-admin.html">📋 Vacantes</a>
            <a href="empleados.html">🧑‍💼 Empleados</a>
          </div>
        </div>
      </nav>
      <div class="spacer"></div>
      <div class="user-box">
        <div id="userName">-</div>
        <a href="cambiar-password.html" class="btn secondary btn-auto mt-4">🔑 Cambiar contraseña</a>
        <button class="btn secondary logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>📢 Comunicados</h1>
      </header>

      <div class="card solo-admin hidden" id="publicarCard">
        <h2>Publicar comunicado</h2>
        <form id="comunicadoForm">
          <label for="tituloComunicado">Título</label>
          <input type="text" id="tituloComunicado" required maxlength="150">

          <label for="cuerpoComunicado">Contenido</label>
          <textarea id="cuerpoComunicado" rows="4" required maxlength="2000"></textarea>

          <label class="checkbox-row">
            <input type="checkbox" id="fijadoCheck"> Fijar arriba del todo
          </label>

          <div class="alert" id="alertBox"></div>
          <button type="submit" class="btn" id="publicarBtn">Publicar</button>
        </form>
      </div>

      <div id="feedComunicados"><p class="text-muted text-center">Cargando...</p></div>
    </main>
  </div>

  <script type="module" src="js/comunicados.js"></script>
</body>
</html>
