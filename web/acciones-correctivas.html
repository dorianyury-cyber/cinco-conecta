<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinco Conecta — Acciones Correctivas</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="reconocimientos.html" class="brand">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Cinco Conecta</span>
      </a>
      <nav>
        <a href="reconocimientos.html">🙌 Reconocimientos</a>
        <a href="encuestas.html">📊 Encuestas</a>
        <a href="comunicados.html">📢 Comunicados</a>
        <a href="incidentes.html">⚠️ Incidentes</a>
        <a href="acciones-correctivas.html">✅ Acciones Correctivas</a>
        <a href="documentos.html">📁 Documentos</a>
        <a href="auditorias.html">🔍 Auditorías</a>
        <a href="informes-plantillas.html">📑 Plantillas Informes</a>
        <a href="informes-libres.html">📝 Informes Libres</a>
        <a href="candidatos.html" class="solo-admin">👥 Candidatos</a>
        <a href="vacantes-admin.html" class="solo-admin">📋 Vacantes</a>
        <a href="empleados.html" class="solo-admin">🧑‍💼 Empleados</a>
      </nav>
      <div class="spacer"></div>
      <div class="user-box">
        <div id="userName">-</div>
        <a href="cambiar-password.html" class="btn secondary btn-auto mt-4">🔑 Cambiar contraseña</a>
        <button class="btn secondary logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>✅ Acciones Correctivas (CAPA)</h1>
      </header>

      <div class="card solo-admin hidden" id="crearCard">
        <h2>Nueva acción correctiva</h2>
        <p class="text-muted text-sm" id="origenTexto"></p>
        <form id="crearForm">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" rows="3" required maxlength="1000"></textarea>

          <label for="responsableUid">Responsable</label>
          <select id="responsableUid" required></select>

          <label for="fechaLimite">Fecha límite</label>
          <input type="date" id="fechaLimite" required>

          <div class="alert" id="crearAlertBox"></div>
          <button type="submit" class="btn" id="crearBtn">Crear</button>
        </form>
      </div>

      <div class="card">
        <div class="toolbar">
          <h2 class="m-0">Listado</h2>
          <button class="btn secondary btn-auto" id="exportarBtn">📊 Exportar a Excel</button>
        </div>
        <div id="listaAcciones"><p class="text-muted text-center">Cargando...</p></div>
      </div>
    </main>
  </div>

  <script type="module" src="js/acciones-correctivas.js"></script>
</body>
</html>
