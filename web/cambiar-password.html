<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinco Conecta — Cambiar contraseña</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Cinco Conecta</span>
      </div>
      <h1>Cambiar contraseña</h1>
      <p class="text-muted text-sm" id="motivoTexto">Por seguridad, ingresa una nueva contraseña para tu cuenta.</p>

      <form id="cambiarForm">
        <label for="passwordActual">Contraseña actual</label>
        <input type="password" id="passwordActual" required autocomplete="current-password">

        <label for="passwordNueva">Nueva contraseña</label>
        <input type="password" id="passwordNueva" required minlength="8" autocomplete="new-password">

        <label for="passwordConfirmar">Confirmar nueva contraseña</label>
        <input type="password" id="passwordConfirmar" required minlength="8" autocomplete="new-password">

        <div class="alert" id="alertBox"></div>
        <button type="submit" class="btn" id="guardarBtn">Guardar nueva contraseña</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/cambiar-password.js"></script>
</body>
</html>
