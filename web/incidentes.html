<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinco Conecta — Incidentes</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="reconocimientos.html" class="brand">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Cinco Conecta</span>
      </a>
      <nav>
        <div class="nav-group" data-grupo="experiencia">
          <button type="button" class="nav-group-toggle">
            <span>🙌 Experiencia</span>
            <span class="nav-group-chevron">▾</span>
          </button>
          <div class="nav-group-items">
            <a href="reconocimientos.html">🙌 Reconocimientos</a>
            <a href="encuestas.html">📊 Encuestas</a>
            <a href="comunicados.html">📢 Comunicados</a>
          </div>
        </div>

        <div class="nav-group" data-grupo="sgi">
          <button type="button" class="nav-group-toggle">
            <span>✅ SGI-HSEQ</span>
            <span class="nav-group-chevron">▾</span>
          </button>
          <div class="nav-group-items">
            <a href="incidentes.html">⚠️ Incidentes</a>
            <a href="acciones-correctivas.html">✅ Acciones Correctivas</a>
            <a href="documentos.html">📁 Documentos</a>
            <a href="auditorias.html">🔍 Auditorías</a>
          </div>
        </div>

        <div class="nav-group" data-grupo="interventoria">
          <button type="button" class="nav-group-toggle">
            <span>📝 Interventoría</span>
            <span class="nav-group-chevron">▾</span>
          </button>
          <div class="nav-group-items">
            <a href="informes-plantillas.html">📑 Plantillas Informes</a>
            <a href="informes-libres.html">📝 Informes Libres</a>
          </div>
        </div>

        <div class="nav-group solo-admin" data-grupo="talento">
          <button type="button" class="nav-group-toggle">
            <span>👥 Talento Humano</span>
            <span class="nav-group-chevron">▾</span>
          </button>
          <div class="nav-group-items">
            <a href="candidatos.html">👥 Candidatos</a>
            <a href="vacantes-admin.html">📋 Vacantes</a>
            <a href="empleados.html">🧑‍💼 Empleados</a>
          </div>
        </div>
      </nav>
      <div class="spacer"></div>
      <div class="user-box">
        <div id="userName">-</div>
        <a href="cambiar-password.html" class="btn secondary btn-auto mt-4">🔑 Cambiar contraseña</a>
        <button class="btn secondary logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>⚠️ Incidentes y casi-accidentes</h1>
      </header>

      <div class="card">
        <h2>Reportar</h2>
        <form id="incidenteForm">
          <label for="tipo">Tipo</label>
          <select id="tipo">
            <option value="incidente">Incidente</option>
            <option value="casi_accidente">Casi-accidente</option>
          </select>

          <label for="titulo">Título</label>
          <input type="text" id="titulo" required maxlength="150">

          <label for="lugar">Lugar</label>
          <input type="text" id="lugar" required maxlength="150">

          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" required>

          <label for="gravedad">Gravedad</label>
          <select id="gravedad">
            <option value="leve">Leve</option>
            <option value="moderada">Moderada</option>
            <option value="grave">Grave</option>
          </select>

          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" rows="3" required maxlength="2000"></textarea>

          <label for="foto">Foto (opcional, JPG/PNG/WEBP, máx. 5 MB)</label>
          <input type="file" id="foto" accept=".jpg,.jpeg,.png,.webp">

          <div class="alert" id="alertBox"></div>
          <button type="submit" class="btn" id="reportarBtn">Reportar</button>
        </form>
      </div>

      <div class="card">
        <div class="toolbar">
          <h2 class="m-0">Listado</h2>
          <button class="btn secondary btn-auto" id="generarInformeBtn">📄 Generar informe PDF</button>
        </div>
        <div id="listaIncidentes"><p class="text-muted text-center">Cargando...</p></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="js/incidentes.js"></script>
</body>
</html>
