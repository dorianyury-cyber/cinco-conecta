<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinco Conecta — Vacantes</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="candidatos.html" class="brand">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Cinco Conecta</span>
      </a>
      <nav>
        <a href="reconocimientos.html">🙌 Reconocimientos</a>
        <a href="encuestas.html">📊 Encuestas</a>
        <a href="comunicados.html">📢 Comunicados</a>
        <a href="incidentes.html">⚠️ Incidentes</a>
        <a href="acciones-correctivas.html">✅ Acciones Correctivas</a>
        <a href="documentos.html">📁 Documentos</a>
        <a href="auditorias.html">🔍 Auditorías</a>
        <a href="informes-plantillas.html">📑 Plantillas Informes</a>
        <a href="informes-libres.html">📝 Informes Libres</a>
        <a href="candidatos.html" class="solo-admin">👥 Candidatos</a>
        <a href="vacantes-admin.html" class="solo-admin">📋 Vacantes</a>
        <a href="empleados.html" class="solo-admin">🧑‍💼 Empleados</a>
      </nav>
      <div class="spacer"></div>
      <div class="user-box">
        <div id="userName">-</div>
        <a href="cambiar-password.html" class="btn secondary btn-auto mt-4">🔑 Cambiar contraseña</a>
        <button class="btn secondary logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>📋 Vacantes</h1>
      </header>

      <div class="card">
        <div class="toolbar">
          <button class="btn btn-auto" id="nuevaVacanteBtn">+ Nueva vacante</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Estado</th>
              <th>Publicada</th>
              <th>Candidatos</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tablaVacantes">
            <tr><td colspan="5" class="text-muted text-center">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalTitulo">Nueva vacante</h2>
      <form id="vacanteForm">
        <input type="hidden" id="vacanteId">

        <label for="titulo">Título</label>
        <input type="text" id="titulo" required maxlength="120">

        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" rows="3" maxlength="500"></textarea>

        <label for="requisitos">Requisitos</label>
        <textarea id="requisitos" rows="4" maxlength="1000"></textarea>

        <label for="estado">Estado</label>
        <select id="estado">
          <option value="abierta">Abierta</option>
          <option value="cerrada">Cerrada</option>
        </select>

        <div class="alert" id="alertBox"></div>
        <button type="submit" class="btn" id="guardarBtn">Guardar</button>
        <button type="button" class="btn secondary" id="cancelarBtn">Cancelar</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/vacantes-admin.js"></script>
</body>
</html>
