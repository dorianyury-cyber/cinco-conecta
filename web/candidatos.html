<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinco Conecta — Candidatos</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="candidatos.html" class="brand">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Cinco Conecta</span>
      </a>
      <nav>
        <a href="candidatos.html" class="active">👥 Candidatos</a>
        <a href="vacantes-admin.html">📋 Vacantes</a>
      </nav>
      <div class="spacer"></div>
      <div class="user-box">
        <div id="userName">-</div>
        <button class="btn secondary logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>👥 Candidatos</h1>
      </header>

      <div class="card">
        <div class="toolbar">
          <select id="filtroVacante">
            <option value="">Todas las vacantes</option>
          </select>
          <button class="btn secondary btn-auto" id="exportarBtn">📊 Exportar a Excel</button>
          <button class="btn secondary btn-auto" id="generarInformeBtn">📄 Generar informe PDF</button>
        </div>
        <div class="kanban" id="kanban"></div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalNombre">Candidato</h2>
      <p class="text-muted mt-neg-10" id="modalVacante"></p>

      <label>Contacto</label>
      <p id="modalContacto" class="mt-4"></p>

      <label>Hoja de vida</label>
      <p><a href="#" id="modalHojaVida" target="_blank" rel="noopener">Cargando enlace...</a></p>

      <label for="modalEtapa">Etapa</label>
      <select id="modalEtapa">
        <option value="recibido">Recibido</option>
        <option value="preseleccionado">Preseleccionado</option>
        <option value="entrevista">Entrevista</option>
        <option value="prueba">Prueba</option>
        <option value="oferta">Oferta</option>
        <option value="contratado">Contratado</option>
        <option value="rechazado">Rechazado</option>
      </select>

      <label for="modalNotas">Notas internas</label>
      <textarea id="modalNotas" rows="4"></textarea>

      <div class="alert" id="modalAlert"></div>
      <button type="button" class="btn" id="guardarCandidatoBtn">Guardar</button>
      <button type="button" class="btn secondary" id="cerrarModalBtn">Cerrar</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="js/candidatos.js"></script>
</body>
</html>
