<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consultar estado — Cinco S.A.S.</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="vacantes.html">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Trabaja con Nosotros</span>
      </a>
      <button id="navToggle" aria-label="Abrir menú">☰</button>
      <nav class="main-nav">
        <a href="vacantes.html">Vacantes</a>
        <a href="estado.html" class="active">Consultar estado</a>
        <a href="https://cinco-sas.web.app">Sitio de Cinco S.A.S.</a>
      </nav>
    </div>
  </header>

  <div class="page-banner">
    <span class="eyebrow">Seguimiento</span>
    <h1>Consulta el estado de tu postulación</h1>
    <p>Ingresa el email y la cédula con los que te postulaste.</p>
  </div>

  <section class="public-section">
    <div class="container">
      <div class="card">
        <form id="estadoForm">
          <label for="email">Email</label>
          <input type="email" id="email" required maxlength="120">

          <label for="cedula">Número de cédula</label>
          <input type="text" id="cedula" required maxlength="20">

          <button type="submit" class="btn" id="estadoBtn">Consultar</button>
          <div class="alert" id="estadoAlert"></div>
        </form>
      </div>

      <div id="resultadoEstado"></div>
    </div>
  </section>

  <footer class="site-footer">
    Cinco S.A.S. — Construcción, Ingeniería y Consultoría · <span class="anio-actual"></span>
  </footer>

  <script src="js/site.js"></script>
  <script type="module" src="js/estado.js"></script>
</body>
</html>
