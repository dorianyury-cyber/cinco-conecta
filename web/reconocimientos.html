<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinco Conecta — Reconocimientos</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="reconocimientos.html" class="brand">
        <img src="assets/img/logo.png" alt="Cinco S.A.S.">
        <span>Cinco Conecta</span>
      </a>
      <nav>
        <a href="reconocimientos.html">🙌 Reconocimientos</a>
        <a href="encuestas.html">📊 Encuestas</a>
        <a href="comunicados.html">📢 Comunicados</a>
        <a href="incidentes.html">⚠️ Incidentes</a>
        <a href="acciones-correctivas.html">✅ Acciones Correctivas</a>
        <a href="documentos.html">📁 Documentos</a>
        <a href="auditorias.html">🔍 Auditorías</a>
        <a href="informes-plantillas.html">📑 Plantillas Informes</a>
        <a href="informes-libres.html">📝 Informes Libres</a>
        <a href="candidatos.html" class="solo-admin">👥 Candidatos</a>
        <a href="vacantes-admin.html" class="solo-admin">📋 Vacantes</a>
        <a href="empleados.html" class="solo-admin">🧑‍💼 Empleados</a>
      </nav>
      <div class="spacer"></div>
      <div class="user-box">
        <div id="userName">-</div>
        <button class="btn secondary logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>🙌 Reconocimientos</h1>
      </header>

      <div class="card">
        <h2>Reconoce a un compañero</h2>
        <form id="reconocerForm">
          <label for="paraUid">¿A quién quieres reconocer?</label>
          <select id="paraUid" required></select>

          <label for="valor">¿Qué valor demostró?</label>
          <select id="valor" required></select>

          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" rows="3" maxlength="300" required placeholder="Cuéntale por qué se lo merece..."></textarea>

          <div class="alert" id="alertBox"></div>
          <button type="submit" class="btn" id="enviarBtn">Reconocer</button>
        </form>
      </div>

      <div id="muroReconocimientos"><p class="text-muted text-center">Cargando...</p></div>
    </main>
  </div>

  <script type="module" src="js/reconocimientos.js"></script>
</body>
</html>
